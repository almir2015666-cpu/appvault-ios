workflows:
  ios-release:
    name: AppVault - iOS App Store Release
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: appstore_codemagic_admin
    environment:
      vars:
        BUNDLE_ID: com.appvault.app
        XCODE_SCHEME: AppVault
        APPLE_TEAM_ID: 66U94U6Q5H
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
    scripts:
      - name: Instalar XcodeGen
        script: brew install xcodegen

      - name: Gerar projeto Xcode
        script: xcodegen generate

      - name: Configurar keychain e certificados
        script: |
          keychain initialize
          # Gerar chave privada RSA
          openssl genrsa -out /tmp/dist_key.pem 2048
          export CERT_KEY="$(cat /tmp/dist_key.pem)"
          # Criar certificado e salvar .p12 no local que keychain add-certificates encontra
          mkdir -p ~/Library/MobileDevice/Certificates
          app-store-connect certificates create \
            --type IOS_DISTRIBUTION \
            --certificate-key "$CERT_KEY" \
            --p12-password "appvault2024" \
            --p12-path ~/Library/MobileDevice/Certificates/distribution.p12
          # Buscar/criar perfis passando a chave privada (evita erro "no private key")
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE --create --certificate-key "$CERT_KEY"
          app-store-connect fetch-signing-files "com.appvault.app.ShieldConfigurationExtension" \
            --type IOS_APP_STORE --create --certificate-key "$CERT_KEY"
          app-store-connect fetch-signing-files "com.appvault.app.ShieldActionExtension" \
            --type IOS_APP_STORE --create --certificate-key "$CERT_KEY"
          # Importar certificado no keychain
          keychain add-certificates --certificate-password "appvault2024"

      - name: Configurar assinatura
        script: xcode-project use-profiles

      - name: Número de build único
        script: agvtool new-version -all $(date +%s)

      - name: Build e Archive
        script: |
          xcodebuild \
            -project AppVault.xcodeproj \
            -scheme "$XCODE_SCHEME" \
            -configuration Release \
            -archivePath build/AppVault.xcarchive \
            -destination "generic/platform=iOS" \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            archive

      - name: Exportar .ipa
        script: |
          xcodebuild \
            -exportArchive \
            -archivePath build/AppVault.xcarchive \
            -exportPath build/export \
            -exportOptionsPlist ExportOptions.plist

    artifacts:
      - build/export/*.ipa
      - build/AppVault.xcarchive

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true

  ios-simulator:
    name: AppVault - Validar Build (Simulador)
    max_build_duration: 20
    instance_type: mac_mini_m2
    scripts:
      - name: Instalar XcodeGen
        script: brew install xcodegen

      - name: Gerar projeto Xcode
        script: xcodegen generate

      - name: Build para Simulador
        script: |
          xcodebuild build \
            -project AppVault.xcodeproj \
            -scheme AppVault \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO
