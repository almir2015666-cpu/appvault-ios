workflows:
  ios-release:
    name: AppVault - iOS App Store Release
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      groups:
        - nutri
      vars:
        BUNDLE_ID: com.appvault.app
        XCODE_SCHEME: AppVault
        APPLE_TEAM_ID: 66U94U6Q5H
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
    scripts:
      - name: Instalar XcodeGen
        script: brew install xcodegen

      - name: Gerar projeto Xcode
        script: xcodegen generate

      - name: Configurar keychain e certificados
        script: |
          keychain initialize
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE --create \
            --api-key "$APP_STORE_CONNECT_API_KEY" \
            --key-id "$APP_STORE_CONNECT_KEY_ID" \
            --issuer-id "$APP_STORE_CONNECT_ISSUER_ID"
          app-store-connect fetch-signing-files "com.appvault.ShieldConfigurationExtension" \
            --type IOS_APP_STORE --create \
            --api-key "$APP_STORE_CONNECT_API_KEY" \
            --key-id "$APP_STORE_CONNECT_KEY_ID" \
            --issuer-id "$APP_STORE_CONNECT_ISSUER_ID"
          app-store-connect fetch-signing-files "com.appvault.ShieldActionExtension" \
            --type IOS_APP_STORE --create \
            --api-key "$APP_STORE_CONNECT_API_KEY" \
            --key-id "$APP_STORE_CONNECT_KEY_ID" \
            --issuer-id "$APP_STORE_CONNECT_ISSUER_ID"
          keychain add-certificates

      - name: Configurar assinatura
        script: xcode-project use-profiles

      - name: Número de build único
        script: agvtool new-version -all $(date +%s)

      - name: Build e Archive
        script: |
          xcodebuild \
            -project AppVault.xcodeproj \
            -scheme "$XCODE_SCHEME" \
            -configuration Release \
            -archivePath build/AppVault.xcarchive \
            -destination "generic/platform=iOS" \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            archive

      - name: Exportar .ipa
        script: |
          xcodebuild \
            -exportArchive \
            -archivePath build/AppVault.xcarchive \
            -exportPath build/export \
            -exportOptionsPlist ExportOptions.plist

    artifacts:
      - build/export/*.ipa
      - build/AppVault.xcarchive

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_API_KEY
        key_id: $APP_STORE_CONNECT_KEY_ID
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true

  ios-simulator:
    name: AppVault - Validar Build (Simulador)
    max_build_duration: 20
    instance_type: mac_mini_m2
    scripts:
      - name: Instalar XcodeGen
        script: brew install xcodegen

      - name: Gerar projeto Xcode
        script: xcodegen generate

      - name: Build para Simulador
        script: |
          xcodebuild build \
            -project AppVault.xcodeproj \
            -scheme AppVault \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO
