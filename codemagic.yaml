workflows:
  ios-release:
    name: AppVault - iOS App Store Release
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: appstore_codemagic_admin
    environment:
      groups:
        - appvault
      vars:
        BUNDLE_ID: com.appvault.app
        XCODE_SCHEME: AppVault
        APPLE_TEAM_ID: 66U94U6Q5H
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
    scripts:
      - name: Instalar XcodeGen
        script: brew install xcodegen

      - name: Gerar projeto Xcode
        script: xcodegen generate

      - name: Configurar keychain e certificados
        script: |
          keychain initialize
          mkdir -p ~/Library/MobileDevice/Certificates
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles

          app-store-connect certificates create \
            --type IOS_DISTRIBUTION \
            --certificate-key "$DIST_CERT_KEY" \
            --p12-password "appvault2024" \
            --p12-path ~/Library/MobileDevice/Certificates/distribution.p12 || true

          PROFILES_DIR=~/Library/MobileDevice/Provisioning\ Profiles
          XCODE_PROFILES="$HOME/Library/Developer/Xcode/UserData/Provisioning Profiles"

          if [ -n "$PROVISIONING_PROFILE_BASE64" ]; then
            echo "Instalando provisioning profile manual..."
            echo "$PROVISIONING_PROFILE_BASE64" | base64 --decode > "$PROFILES_DIR/AppVault_AppStore.mobileprovision"
          else
            ALL_BUNDLE_RES_IDS=$(app-store-connect bundle-ids list \
              --bundle-id-identifier "$BUNDLE_ID" \
              --json 2>/dev/null | \
              python3 -c "import json,sys; [print(x['id']) for x in json.load(sys.stdin)]" 2>/dev/null || true)

            MAIN_BUNDLE_RES_ID=$(echo "$ALL_BUNDLE_RES_IDS" | head -1)

            if [ -n "$MAIN_BUNDLE_RES_ID" ]; then
              echo "Bundle ID resource: $MAIN_BUNDLE_RES_ID"
              app-store-connect bundle-ids enable-capabilities "$MAIN_BUNDLE_RES_ID" --capability "App Groups" 2>&1 || true
            fi

            # Registrar bundle IDs das extensoes (se nao existirem)
            app-store-connect bundle-ids create \
              --bundle-id "com.appvault.app.ShieldConfigurationExtension" \
              --name "AppVault Shield Configuration" \
              --platform IOS 2>/dev/null || true
            app-store-connect bundle-ids create \
              --bundle-id "com.appvault.app.ShieldActionExtension" \
              --name "AppVault Shield Action" \
              --platform IOS 2>/dev/null || true

            # Obter resource IDs das extensoes
            CONFIG_RES_ID=$(app-store-connect bundle-ids list \
              --bundle-id-identifier "com.appvault.app.ShieldConfigurationExtension" \
              --json 2>/dev/null | \
              python3 -c "import json,sys; d=json.load(sys.stdin); print(d[0]['id'] if d else '')" 2>/dev/null || true)
            ACTION_RES_ID=$(app-store-connect bundle-ids list \
              --bundle-id-identifier "com.appvault.app.ShieldActionExtension" \
              --json 2>/dev/null | \
              python3 -c "import json,sys; d=json.load(sys.stdin); print(d[0]['id'] if d else '')" 2>/dev/null || true)

            ALL_BUNDLE_RES_IDS="$ALL_BUNDLE_RES_IDS $CONFIG_RES_ID $ACTION_RES_ID"
            export CONFIG_RES_ID ACTION_RES_ID

            # Usar Python + credenciais do env para gerar JWT e chamar API diretamente
            python3 << 'PYEOF'
import os, time, json, base64, urllib.request, urllib.error

issuer_id = os.environ.get('APP_STORE_CONNECT_ISSUER_ID','')
key_id = os.environ.get('APP_STORE_CONNECT_KEY_IDENTIFIER','')
private_key_pem = os.environ.get('APP_STORE_CONNECT_PRIVATE_KEY','')

if not all([issuer_id, key_id, private_key_pem]):
    print("Credenciais ASC nao encontradas, pulando")
    exit(0)

from cryptography.hazmat.primitives import hashes, serialization
from cryptography.hazmat.primitives.asymmetric import ec
from cryptography.hazmat.primitives.asymmetric.utils import decode_dss_signature

pem = private_key_pem.strip().replace('\\n', '\n')
if not pem.startswith('-----'):
    import textwrap
    pem = '-----BEGIN PRIVATE KEY-----\n' + '\n'.join(textwrap.wrap(pem, 64)) + '\n-----END PRIVATE KEY-----'

private_key = serialization.load_pem_private_key(pem.encode(), password=None)
now = int(time.time())
hdr = base64.urlsafe_b64encode(json.dumps({"alg":"ES256","kid":key_id,"typ":"JWT"}).encode()).rstrip(b'=').decode()
pld = base64.urlsafe_b64encode(json.dumps({"iss":issuer_id,"iat":now,"exp":now+1200,"aud":"appstoreconnect-v1"}).encode()).rstrip(b'=').decode()
msg = f"{hdr}.{pld}".encode()
sig_der = private_key.sign(msg, ec.ECDSA(hashes.SHA256()))
r, s = decode_dss_signature(sig_der)
sig = base64.urlsafe_b64encode(r.to_bytes(32,'big') + s.to_bytes(32,'big')).rstrip(b'=').decode()
jwt = f"{hdr}.{pld}.{sig}"

ext_ids = [i for i in [os.environ.get('CONFIG_RES_ID',''), os.environ.get('ACTION_RES_ID','')] if i]
# Tentar obter de env vars alternativas
import subprocess
for var,bid in [('CONFIG_RES_ID','com.appvault.app.ShieldConfigurationExtension'),('ACTION_RES_ID','com.appvault.app.ShieldActionExtension')]:
    val = os.environ.get(var,'')
    if not val:
        try:
            r2 = subprocess.run(['app-store-connect','bundle-ids','list','--bundle-id-identifier',bid,'--json'], capture_output=True, text=True)
            d = json.loads(r2.stdout)
            if d: val = d[0]['id']
        except: pass
    if val and val not in ext_ids:
        ext_ids.append(val)

headers = {'Authorization': f'Bearer {jwt}', 'Content-Type': 'application/json'}

for res_id in ext_ids:
    if not res_id: continue
    # 1. Habilitar Family Controls
    body = json.dumps({"data":{"type":"bundleIdCapabilities","attributes":{"capabilityType":"FAMILY_CONTROLS","settings":[]},"relationships":{"bundleId":{"data":{"type":"bundleIds","id":res_id}}}}}).encode()
    req = urllib.request.Request('https://api.appstoreconnect.apple.com/v1/bundleIdCapabilities', data=body, headers=headers, method='POST')
    try:
        with urllib.request.urlopen(req) as resp:
            print(f"Family Controls habilitado para {res_id}: {resp.status}")
    except urllib.error.HTTPError as e:
        print(f"Family Controls {res_id}: {e.code} {e.read().decode()[:200]}")

    # 2. Deletar profiles existentes para este bundle ID
    url = f'https://api.appstoreconnect.apple.com/v1/bundleIds/{res_id}/profiles?filter[profileType]=IOS_APP_STORE&limit=20'
    req2 = urllib.request.Request(url, headers={'Authorization': f'Bearer {jwt}'})
    try:
        with urllib.request.urlopen(req2) as resp2:
            pdata = json.loads(resp2.read())
            for p in pdata.get('data',[]):
                pid = p['id']
                del_req = urllib.request.Request(f'https://api.appstoreconnect.apple.com/v1/profiles/{pid}', headers={'Authorization': f'Bearer {jwt}'}, method='DELETE')
                try:
                    with urllib.request.urlopen(del_req) as dr: print(f"Profile {pid} deletado para {res_id}: {dr.status}")
                except urllib.error.HTTPError as e2: print(f"Delete {pid}: {e2.code}")
    except urllib.error.HTTPError as e3:
        print(f"Listar profiles {res_id}: {e3.code} {e3.read().decode()[:200]}")
PYEOF

            # Deletar todos os profiles appvault via bundle-ids profiles (loop principal)
            for brid in $ALL_BUNDLE_RES_IDS; do
              for pid in $(app-store-connect bundle-ids profiles "$brid" --json 2>/dev/null | python3 -c "import json,sys; [print(p.get('id','')) for p in json.load(sys.stdin)]" 2>/dev/null || true); do
                echo "Deletando perfil $pid (bundle: $brid)"
                app-store-connect profiles delete "$pid" 2>&1 || true
              done
            done

            for BID in "$BUNDLE_ID" \
                       "com.appvault.app.ShieldConfigurationExtension" \
                       "com.appvault.app.ShieldActionExtension"; do
              app-store-connect fetch-signing-files "$BID" \
                --type IOS_APP_STORE --create \
                --certificate-key "$DIST_CERT_KEY" \
                --p12-password "appvault2024" \
                --certificates-dir ~/Library/MobileDevice/Certificates/
            done
          fi

          keychain add-certificates --certificate-password "appvault2024"

      - name: Configurar assinatura
        script: xcode-project use-profiles

      - name: Número de build único
        script: agvtool new-version -all $(date +%s)

      - name: Build e Archive
        script: |
          xcodebuild \
            -project AppVault.xcodeproj \
            -scheme "$XCODE_SCHEME" \
            -configuration Release \
            -archivePath build/AppVault.xcarchive \
            -destination "generic/platform=iOS" \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            archive

      - name: Exportar .ipa
        script: |
          python3 - << 'PYEOF'
          import subprocess, plistlib, glob, os, sys

          provisioning = {}
          for d in [
            "~/Library/MobileDevice/Provisioning Profiles",
            "~/Library/Developer/Xcode/UserData/Provisioning Profiles"
          ]:
            for f in glob.glob(os.path.expanduser(d + "/*.mobileprovision")):
              r = subprocess.run(["security", "cms", "-D", "-i", f], capture_output=True)
              if r.returncode != 0:
                continue
              pl = plistlib.loads(r.stdout)
              bid = pl.get("Entitlements", {}).get("application-identifier", "")
              bid = ".".join(bid.split(".")[1:]) if "." in bid else ""
              name = pl.get("Name", "")
              if bid and name and "appvault" in bid.lower():
                provisioning[bid] = name
                print(f"  {bid} -> {name}", flush=True)

          if not provisioning:
            print("ERRO: nenhum perfil encontrado!", file=sys.stderr)
            sys.exit(1)

          opts = {
            "method": "app-store-connect",
            "teamID": "66U94U6Q5H",
            "signingStyle": "manual",
            "stripSwiftSymbols": True,
            "uploadSymbols": True,
            "provisioningProfiles": provisioning
          }
          with open("ExportOptions.plist", "wb") as fh:
            plistlib.dump(opts, fh)
          print(f"ExportOptions.plist gerado com {len(provisioning)} perfis", flush=True)
          PYEOF

          xcodebuild \
            -exportArchive \
            -archivePath build/AppVault.xcarchive \
            -exportPath build/export \
            -exportOptionsPlist ExportOptions.plist

    artifacts:
      - build/export/*.ipa
      - build/AppVault.xcarchive

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true

  ios-simulator:
    name: AppVault - Validar Build (Simulador)
    max_build_duration: 20
    instance_type: mac_mini_m2
    scripts:
      - name: Instalar XcodeGen
        script: brew install xcodegen

      - name: Gerar projeto Xcode
        script: xcodegen generate

      - name: Build para Simulador
        script: |
          xcodebuild build \
            -project AppVault.xcodeproj \
            -scheme AppVault \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO
