workflows:
  ios-release:
    name: AppVault - iOS App Store Release
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: appstore_codemagic_admin
    environment:
      groups:
        - appvault
      vars:
        BUNDLE_ID: com.appvault.app
        XCODE_SCHEME: AppVault
        APPLE_TEAM_ID: 66U94U6Q5H
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
    scripts:
      - name: Instalar XcodeGen
        script: brew install xcodegen

      - name: Gerar projeto Xcode
        script: xcodegen generate

      - name: Configurar keychain e certificados
        script: |
          keychain initialize
          mkdir -p ~/Library/MobileDevice/Certificates
          # Criar cert com a chave permanente (|| true caso já exista 409)
          app-store-connect certificates create \
            --type IOS_DISTRIBUTION \
            --certificate-key "$DIST_CERT_KEY" \
            --p12-password "appvault2024" \
            --p12-path ~/Library/MobileDevice/Certificates/distribution.p12 || true
          # Deletar perfis antigos para recriar com o novo certificado + FamilyControls
          for bid in "$BUNDLE_ID" "com.appvault.app.ShieldConfigurationExtension" "com.appvault.app.ShieldActionExtension"; do
            profile_ids=$(app-store-connect profiles list \
              --bundle-id-identifier "$bid" \
              --profile-type IOS_APP_STORE \
              --json 2>/dev/null | \
              python3 -c "import json,sys; [print(x['id']) for x in json.load(sys.stdin)]" 2>/dev/null || true)
            for pid in $profile_ids; do
              echo "Deletando perfil $pid"
              app-store-connect profiles delete "$pid" 2>/dev/null || true
            done
          done
          # Criar perfis novos (App IDs já têm FamilyControls activado)
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE --create \
            --certificate-key "$DIST_CERT_KEY" \
            --p12-password "appvault2024" \
            --certificates-dir ~/Library/MobileDevice/Certificates/
          app-store-connect fetch-signing-files "com.appvault.app.ShieldConfigurationExtension" \
            --type IOS_APP_STORE --create \
            --certificate-key "$DIST_CERT_KEY" \
            --p12-password "appvault2024" \
            --certificates-dir ~/Library/MobileDevice/Certificates/
          app-store-connect fetch-signing-files "com.appvault.app.ShieldActionExtension" \
            --type IOS_APP_STORE --create \
            --certificate-key "$DIST_CERT_KEY" \
            --p12-password "appvault2024" \
            --certificates-dir ~/Library/MobileDevice/Certificates/
          keychain add-certificates --certificate-password "appvault2024"
          # Verificar se perfis têm FamilyControls
          echo "=== Verificando entitlements dos perfis ==="
          for f in ~/Library/MobileDevice/Provisioning\ Profiles/*.mobileprovision; do
            echo "--- $f ---"
            security cms -D -i "$f" 2>/dev/null | grep -A2 "family-controls" || echo "family-controls: NAO ENCONTRADO"
          done

      - name: Configurar assinatura
        script: xcode-project use-profiles

      - name: Número de build único
        script: agvtool new-version -all $(date +%s)

      - name: Build e Archive
        script: |
          xcodebuild \
            -project AppVault.xcodeproj \
            -scheme "$XCODE_SCHEME" \
            -configuration Release \
            -archivePath build/AppVault.xcarchive \
            -destination "generic/platform=iOS" \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            archive

      - name: Exportar .ipa
        script: |
          # Gerar ExportOptions.plist com nomes reais dos perfis instalados
          python3 - << 'PYEOF'
          import subprocess, plistlib, glob, os, sys

          provisioning = {}
          for d in [
            "~/Library/MobileDevice/Provisioning Profiles",
            "~/Library/Developer/Xcode/UserData/Provisioning Profiles"
          ]:
            for f in glob.glob(os.path.expanduser(d + "/*.mobileprovision")):
              r = subprocess.run(["security", "cms", "-D", "-i", f], capture_output=True)
              if r.returncode != 0:
                continue
              pl = plistlib.loads(r.stdout)
              bid = pl.get("Entitlements", {}).get("application-identifier", "")
              bid = ".".join(bid.split(".")[1:]) if "." in bid else ""
              name = pl.get("Name", "")
              if bid and name and "appvault" in bid.lower():
                provisioning[bid] = name
                print(f"  {bid} -> {name}", flush=True)

          if not provisioning:
            print("ERRO: nenhum perfil encontrado!", file=sys.stderr)
            sys.exit(1)

          opts = {
            "method": "app-store-connect",
            "teamID": "66U94U6Q5H",
            "signingStyle": "manual",
            "stripSwiftSymbols": True,
            "uploadSymbols": True,
            "provisioningProfiles": provisioning
          }
          with open("ExportOptions.plist", "wb") as fh:
            plistlib.dump(opts, fh)
          print(f"ExportOptions.plist gerado com {len(provisioning)} perfis", flush=True)
          PYEOF

          xcodebuild \
            -exportArchive \
            -archivePath build/AppVault.xcarchive \
            -exportPath build/export \
            -exportOptionsPlist ExportOptions.plist

    artifacts:
      - build/export/*.ipa
      - build/AppVault.xcarchive

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true

  ios-simulator:
    name: AppVault - Validar Build (Simulador)
    max_build_duration: 20
    instance_type: mac_mini_m2
    scripts:
      - name: Instalar XcodeGen
        script: brew install xcodegen

      - name: Gerar projeto Xcode
        script: xcodegen generate

      - name: Build para Simulador
        script: |
          xcodebuild build \
            -project AppVault.xcodeproj \
            -scheme AppVault \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO
