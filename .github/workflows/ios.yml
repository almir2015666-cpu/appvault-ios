name: AppVault iOS

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-simulator:
    name: Build (Simulador)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Instalar XcodeGen
        run: brew install xcodegen

      - name: Gerar projeto Xcode
        run: xcodegen generate

      - name: Build para Simulador
        run: |
          set -o pipefail
          xcodebuild build \
            -project AppVault.xcodeproj \
            -scheme AppVault \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO | xcpretty || \
          xcodebuild build \
            -project AppVault.xcodeproj \
            -scheme AppVault \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO

  release:
    name: TestFlight
    runs-on: macos-15
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    needs: build-simulator
    env:
      TEAM_ID: 66U94U6Q5H
      APP_STORE_KEY_ID: ${{ secrets.APP_STORE_KEY_ID }}
      APP_STORE_ISSUER_ID: ${{ secrets.APP_STORE_ISSUER_ID }}
      APP_STORE_KEY_BASE64: ${{ secrets.APP_STORE_KEY_BASE64 }}
    steps:
      - uses: actions/checkout@v4

      - name: Validar secrets (fail-fast, mensagem clara)
        run: |
          missing=""
          [ -z "$APP_STORE_KEY_ID" ]    && missing="$missing APP_STORE_KEY_ID"
          [ -z "$APP_STORE_ISSUER_ID" ] && missing="$missing APP_STORE_ISSUER_ID"
          [ -z "$APP_STORE_KEY_BASE64" ] && missing="$missing APP_STORE_KEY_BASE64"
          if [ -n "$missing" ]; then
            echo "::error::Secrets faltando no repo:$missing"
            echo "Configure em: Settings > Secrets and variables > Actions."
            exit 1
          fi
          echo "Todos os secrets ASC presentes."

      - name: Instalar XcodeGen
        run: brew install xcodegen

      - name: Gerar projeto Xcode
        run: xcodegen generate

      - name: Preparar chave da App Store Connect
        run: |
          mkdir -p ~/private_keys
          echo "$APP_STORE_KEY_BASE64" | base64 --decode > ~/private_keys/AuthKey_${APP_STORE_KEY_ID}.p8
          echo "Chave gravada em ~/private_keys/AuthKey_${APP_STORE_KEY_ID}.p8"

      - name: Build e Archive (assinatura automática)
        run: |
          set -o pipefail
          xcodebuild archive \
            -project AppVault.xcodeproj \
            -scheme AppVault \
            -configuration Release \
            -archivePath build/AppVault.xcarchive \
            -destination "generic/platform=iOS" \
            -allowProvisioningUpdates \
            -authenticationKeyPath ~/private_keys/AuthKey_${APP_STORE_KEY_ID}.p8 \
            -authenticationKeyID "$APP_STORE_KEY_ID" \
            -authenticationKeyIssuerID "$APP_STORE_ISSUER_ID" \
            DEVELOPMENT_TEAM="$TEAM_ID" \
            CODE_SIGN_STYLE=Automatic

      - name: Exportar .ipa
        run: |
          xcodebuild -exportArchive \
            -archivePath build/AppVault.xcarchive \
            -exportPath build/export \
            -exportOptionsPlist ExportOptions.plist \
            -allowProvisioningUpdates \
            -authenticationKeyPath ~/private_keys/AuthKey_${APP_STORE_KEY_ID}.p8 \
            -authenticationKeyID "$APP_STORE_KEY_ID" \
            -authenticationKeyIssuerID "$APP_STORE_ISSUER_ID"

      - name: Enviar para TestFlight
        run: |
          xcrun altool --upload-app \
            --type ios \
            --file "$(ls build/export/*.ipa | head -1)" \
            --apiKey "$APP_STORE_KEY_ID" \
            --apiIssuer "$APP_STORE_ISSUER_ID"

      - name: Salvar .ipa como artefato
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: AppVault.ipa
          path: build/export/*.ipa
          if-no-files-found: warn
