name: AppVault iOS

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-simulator:
    name: Build (Simulador)
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - name: Instalar XcodeGen
        run: brew install xcodegen

      - name: Gerar projeto Xcode
        run: xcodegen generate

      - name: Build para Simulador
        run: |
          set -o pipefail
          xcodebuild build \
            -project AppVault.xcodeproj \
            -scheme AppVault \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO | xcpretty || \
          xcodebuild build \
            -project AppVault.xcodeproj \
            -scheme AppVault \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO

  release:
    name: TestFlight
    runs-on: macos-26
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    needs: build-simulator
    env:
      CERTIFICATE_BASE64: ${{ secrets.CERTIFICATE_BASE64 }}
      CERTIFICATE_PASSWORD: ${{ secrets.CERTIFICATE_PASSWORD }}
      PROFILE_APP_BASE64: ${{ secrets.PROFILE_APP_BASE64 }}
      PROFILE_SHIELD_CONFIG_BASE64: ${{ secrets.PROFILE_SHIELD_CONFIG_BASE64 }}
      PROFILE_SHIELD_ACTION_BASE64: ${{ secrets.PROFILE_SHIELD_ACTION_BASE64 }}
      PROFILE_MONITOR_BASE64: ${{ secrets.PROFILE_MONITOR_BASE64 }}
      APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_ISSUER_ID }}
      APP_STORE_CONNECT_KEY_IDENTIFIER: ${{ secrets.APP_STORE_KEY_ID }}
      APP_STORE_KEY_BASE64: ${{ secrets.APP_STORE_KEY_BASE64 }}
    steps:
      - uses: actions/checkout@v4

      - name: Validar secrets (fail-fast)
        run: |
          missing=""
          for v in CERTIFICATE_BASE64 CERTIFICATE_PASSWORD PROFILE_APP_BASE64 \
                   PROFILE_SHIELD_CONFIG_BASE64 PROFILE_SHIELD_ACTION_BASE64 PROFILE_MONITOR_BASE64 \
                   APP_STORE_CONNECT_ISSUER_ID APP_STORE_CONNECT_KEY_IDENTIFIER APP_STORE_KEY_BASE64; do
            eval "val=\${$v}"
            [ -z "$val" ] && missing="$missing $v"
          done
          if [ -n "$missing" ]; then
            echo "::error::Secrets faltando:$missing"
            exit 1
          fi
          echo "Todos os secrets presentes."

      - name: Instalar ferramentas
        run: |
          brew install xcodegen
          pip3 install --break-system-packages codemagic-cli-tools

      - name: Gerar projeto Xcode
        run: xcodegen generate

      - name: Número de build único
        run: |
          BUILD_NUM="$(date +%s)"
          echo "Build number: $BUILD_NUM"
          for plist in \
            AppVault/Info.plist \
            ShieldExtension/ShieldConfigurationExtension-Info.plist \
            ShieldExtension/ShieldActionExtension-Info.plist \
            DeviceActivityMonitor/DeviceActivityMonitor-Info.plist; do
            /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $BUILD_NUM" "$plist"
          done

      - name: Instalar certificado e perfis
        run: |
          set -e
          keychain initialize
          echo "$CERTIFICATE_BASE64" | base64 --decode > "$RUNNER_TEMP/dist.p12"
          keychain add-certificates \
            --certificate "$RUNNER_TEMP/dist.p12" \
            --certificate-password "$CERTIFICATE_PASSWORD"

          PROFILES_HOME="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PROFILES_HOME"
          echo "$PROFILE_APP_BASE64"          | base64 --decode > "$PROFILES_HOME/appvault_app.mobileprovision"
          echo "$PROFILE_SHIELD_CONFIG_BASE64" | base64 --decode > "$PROFILES_HOME/appvault_shield_config.mobileprovision"
          echo "$PROFILE_SHIELD_ACTION_BASE64" | base64 --decode > "$PROFILES_HOME/appvault_shield_action.mobileprovision"
          echo "$PROFILE_MONITOR_BASE64"        | base64 --decode > "$PROFILES_HOME/appvault_monitor.mobileprovision"

          # Configura os targets do projeto (specifier + identidade) a partir dos perfis instalados
          xcode-project use-profiles \
            --export-options-plist "$RUNNER_TEMP/export_options.plist"

      - name: Build e Archive (assinatura manual)
        run: |
          set -o pipefail
          xcodebuild archive \
            -project AppVault.xcodeproj \
            -scheme AppVault \
            -configuration Release \
            -archivePath "$RUNNER_TEMP/AppVault.xcarchive" \
            -destination "generic/platform=iOS" \
            CODE_SIGN_STYLE=Manual

      - name: Exportar .ipa
        run: |
          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/AppVault.xcarchive" \
            -exportPath "$RUNNER_TEMP/export" \
            -exportOptionsPlist "$RUNNER_TEMP/export_options.plist"

      - name: Enviar para TestFlight
        run: |
          mkdir -p ~/private_keys
          echo "$APP_STORE_KEY_BASE64" | base64 --decode > ~/private_keys/AuthKey_${APP_STORE_CONNECT_KEY_IDENTIFIER}.p8
          IPA="$(ls "$RUNNER_TEMP"/export/*.ipa | head -1)"
          echo "Enviando $IPA"
          xcrun altool --upload-app \
            --type ios \
            --file "$IPA" \
            --apiKey "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
            --apiIssuer "$APP_STORE_CONNECT_ISSUER_ID"

      - name: Salvar .ipa como artefato
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: AppVault.ipa
          path: ${{ runner.temp }}/export/*.ipa
          if-no-files-found: warn
