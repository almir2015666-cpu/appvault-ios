name: AppVault iOS

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-simulator:
    name: Build (Simulador)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Instalar XcodeGen
        run: brew install xcodegen

      - name: Gerar projeto Xcode
        run: xcodegen generate

      - name: Build para Simulador
        run: |
          xcodebuild build \
            -project AppVault.xcodeproj \
            -scheme AppVault \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty || xcodebuild build \
              -project AppVault.xcodeproj \
              -scheme AppVault \
              -sdk iphonesimulator \
              -destination 'generic/platform=iOS Simulator' \
              CODE_SIGNING_ALLOWED=NO

  release:
    name: TestFlight
    runs-on: macos-15
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    needs: build-simulator
    steps:
      - uses: actions/checkout@v4

      - name: Instalar XcodeGen
        run: brew install xcodegen

      - name: Gerar projeto Xcode
        run: xcodegen generate

      - name: Importar certificado
        env:
          CERTIFICATE_BASE64: ${{ secrets.CERTIFICATE_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: appvault123
        run: |
          echo "$CERTIFICATE_BASE64" | base64 --decode > cert.p12
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security import cert.p12 -k build.keychain -P "$CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" build.keychain

      - name: Importar perfis de provisionamento
        env:
          PROFILE_BASE64: ${{ secrets.PROFILE_BASE64 }}
          PROFILE_SHIELD_CONFIG_BASE64: ${{ secrets.PROFILE_SHIELD_CONFIG_BASE64 }}
          PROFILE_SHIELD_ACTION_BASE64: ${{ secrets.PROFILE_SHIELD_ACTION_BASE64 }}
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "$PROFILE_BASE64" | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/appvault.mobileprovision
          echo "$PROFILE_SHIELD_CONFIG_BASE64" | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/appvault-shield-config.mobileprovision
          echo "$PROFILE_SHIELD_ACTION_BASE64" | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/appvault-shield-action.mobileprovision

      - name: Build e Archive
        env:
          TEAM_ID: 66U94U6Q5H
        run: |
          xcodebuild archive \
            -project AppVault.xcodeproj \
            -scheme AppVault \
            -configuration Release \
            -archivePath build/AppVault.xcarchive \
            -destination "generic/platform=iOS" \
            DEVELOPMENT_TEAM="$TEAM_ID" \
            CODE_SIGN_STYLE=Manual

      - name: Exportar .ipa
        run: |
          xcodebuild -exportArchive \
            -archivePath build/AppVault.xcarchive \
            -exportPath build/export \
            -exportOptionsPlist ExportOptions.plist

      - name: Enviar para TestFlight
        env:
          APP_STORE_KEY_ID: ${{ secrets.APP_STORE_KEY_ID }}
          APP_STORE_ISSUER_ID: ${{ secrets.APP_STORE_ISSUER_ID }}
          APP_STORE_KEY_BASE64: ${{ secrets.APP_STORE_KEY_BASE64 }}
        run: |
          echo "$APP_STORE_KEY_BASE64" | base64 --decode > AuthKey.p8
          xcrun altool --upload-app \
            --type ios \
            --file build/export/*.ipa \
            --apiKey "$APP_STORE_KEY_ID" \
            --apiIssuer "$APP_STORE_ISSUER_ID" \
            --private-key AuthKey.p8

      - name: Salvar .ipa como artefato
        uses: actions/upload-artifact@v4
        with:
          name: AppVault.ipa
          path: build/export/*.ipa
