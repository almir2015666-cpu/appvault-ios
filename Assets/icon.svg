<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <!-- Background gradient: deep space blue to midnight purple -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0D0D2B"/>
      <stop offset="50%" stop-color="#12104A"/>
      <stop offset="100%" stop-color="#1A0A3E"/>
    </linearGradient>

    <!-- Shield gradient: electric blue to violet -->
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4361EE"/>
      <stop offset="100%" stop-color="#7B2FBE"/>
    </linearGradient>

    <!-- Glow gradient for the lock -->
    <linearGradient id="lockGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#C5D0FF"/>
    </linearGradient>

    <!-- Outer glow filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="18" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Inner shadow for depth -->
    <filter id="innerGlow">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <!-- Soft drop shadow -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="12" stdDeviation="24" flood-color="#4361EE" flood-opacity="0.45"/>
    </filter>
  </defs>

  <!-- Background rounded square (iOS icon shape) -->
  <rect width="1024" height="1024" rx="230" ry="230" fill="url(#bg)"/>

  <!-- Subtle radial glow in center -->
  <radialGradient id="centerGlow" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#4361EE" stop-opacity="0.18"/>
    <stop offset="100%" stop-color="#0D0D2B" stop-opacity="0"/>
  </radialGradient>
  <rect width="1024" height="1024" rx="230" ry="230" fill="url(#centerGlow)"/>

  <!-- Decorative dots pattern (subtle) -->
  <g opacity="0.07">
    <circle cx="180" cy="180" r="5" fill="white"/>
    <circle cx="280" cy="140" r="3" fill="white"/>
    <circle cx="140" cy="310" r="4" fill="white"/>
    <circle cx="844" cy="180" r="5" fill="white"/>
    <circle cx="744" cy="140" r="3" fill="white"/>
    <circle cx="884" cy="310" r="4" fill="white"/>
    <circle cx="180" cy="844" r="5" fill="white"/>
    <circle cx="280" cy="884" r="3" fill="white"/>
    <circle cx="140" cy="714" r="4" fill="white"/>
    <circle cx="844" cy="844" r="5" fill="white"/>
    <circle cx="744" cy="884" r="3" fill="white"/>
    <circle cx="884" cy="714" r="4" fill="white"/>
  </g>

  <!-- Shield shape (main element) with glow -->
  <g filter="url(#shadow)">
    <path d="M512 148
             L720 220
             L720 460
             Q720 620 512 750
             Q304 620 304 460
             L304 220
             Z"
          fill="url(#shieldGrad)"
          opacity="0.22"/>
  </g>

  <!-- Shield stroke / outline -->
  <path d="M512 148
           L720 220
           L720 460
           Q720 620 512 750
           Q304 620 304 460
           L304 220
           Z"
        fill="none"
        stroke="url(#shieldGrad)"
        stroke-width="12"
        stroke-linejoin="round"
        opacity="0.9"/>

  <!-- Shield fill (lighter inner area) -->
  <path d="M512 178
           L696 242
           L696 458
           Q696 600 512 718
           Q328 600 328 458
           L328 242
           Z"
        fill="url(#shieldGrad)"
        opacity="0.14"/>

  <!-- Lock body (shackle arc) -->
  <path d="M440 430
           Q440 362 512 362
           Q584 362 584 430
           L584 462
           L440 462
           Z"
        fill="none"
        stroke="url(#lockGrad)"
        stroke-width="36"
        stroke-linecap="round"
        filter="url(#innerGlow)"/>

  <!-- Lock body (rectangle) -->
  <rect x="398" y="455" width="228" height="168" rx="28" ry="28"
        fill="url(#lockGrad)"
        filter="url(#innerGlow)"/>

  <!-- Keyhole circle -->
  <circle cx="512" cy="528" r="30" fill="url(#bg)" opacity="0.85"/>

  <!-- Keyhole stem -->
  <rect x="499" y="548" width="26" height="42" rx="8" ry="8"
        fill="url(#bg)" opacity="0.85"/>

  <!-- Subtle shine on lock -->
  <ellipse cx="460" cy="488" rx="18" ry="10" fill="white" opacity="0.25" transform="rotate(-15, 460, 488)"/>

  <!-- App name text (for splash/store use) -->
  <!-- Not included in icon but available in store assets -->

</svg>
